{% extends "base.html" %}
{% block title %}Sign Up - Team Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Sign Up</h1>
        <p class="auth-subtitle">Create your Team Tracker account</p>
        
        <form method="POST" action="{{ url_for('auth.signup') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Pick a username">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Min 6 characters" minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        
        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
