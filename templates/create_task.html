{% extends "base.html" %}
{% block title %}Create Task - Team Tracker{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Create New Task</h1>
    
    <form method="POST" class="main-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="title">Task Title *</label>
            <input type="text" id="title" name="title" required placeholder="e.g. Design homepage mockup">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="What needs to be done..."></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="project_id">Project *</label>
                <select id="project_id" name="project_id" required>
                    <option value="">-- Select Project --</option>
                    {% for project in projects %}
                    <option value="{{ project.id }}" {% if preselected_project and preselected_project|int == project.id %}selected{% endif %}>
                        {{ project.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="assigned_to">Assign To</label>
                <select id="assigned_to" name="assigned_to">
                    <option value="">-- Unassigned --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="due_date">Due Date</label>
                <input type="date" id="due_date" name="due_date">
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Task</button>
            <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
